name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (x86_64-musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-musl
          profile: minimal
          override: true

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools musl-dev

      - name: Build release binary (Linux musl)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Rename binary
        run: cp target/x86_64-unknown-linux-musl/release/blazebackup blazebackup-linux-x86_64

      - name: Upload Linux binary artifact
        uses: https://github.com/christopherHX/gitea-upload-artifact@v4
        with:
          name: blazebackup-linux-x86_64
          path: blazebackup-linux-x86_64

  build-windows:
    name: Build Windows (x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-gnu
          profile: minimal
          override: true

      - name: Install MinGW cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 mingw-w64

      - name: Build release binary (Windows)
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Rename binary
        run: cp target/x86_64-pc-windows-gnu/release/blazebackup.exe blazebackup-windows-x86_64.exe

      - name: Upload Windows binary artifact
        uses: https://github.com/christopherHX/gitea-upload-artifact@v4
        with:
          name: blazebackup-windows-x86_64
          path: blazebackup-windows-x86_64.exe

  release:
    name: Create Gitea Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download Linux binary
        uses: https://github.com/christopherHX/gitea-download-artifact@v4
        with:
          name: blazebackup-linux-x86_64
          path: dist/

      - name: Download Windows binary
        uses: https://github.com/christopherHX/gitea-download-artifact@v4
        with:
          name: blazebackup-windows-x86_64
          path: dist/

      - name: Create release and upload assets
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_SERVER_URL: ${{ gitea.server_url }}
          REPO: ${{ gitea.repository }}
          TAG: ${{ gitea.ref_name }}
        run: |
          # Create the release
          RELEASE=$(curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GITEA_SERVER_URL}/api/v1/repos/${REPO}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"${TAG}\",
              \"body\": \"Release ${TAG}\",
              \"draft\": false,
              \"prerelease\": false
            }")

          RELEASE_ID=$(echo "$RELEASE" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          echo "Created release ID: $RELEASE_ID"

          # Upload Linux binary
          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "${GITEA_SERVER_URL}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=blazebackup-linux-x86_64" \
            --data-binary @dist/blazebackup-linux-x86_64

          # Upload Windows binary
          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            "${GITEA_SERVER_URL}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=blazebackup-windows-x86_64.exe" \
            --data-binary @dist/blazebackup-windows-x86_64.exe

          echo "Release ${TAG} created with binaries uploaded."
