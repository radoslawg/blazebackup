name: Nightly Build

on:
  schedule:
    - cron: '0 3 * * *' # 3 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: blazebackup
            asset_name: blazebackup-linux-x86_64
          - os: windows-latest
            artifact_name: blazebackup.exe
            asset_name: blazebackup-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (Nightly)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          profile: minimal

      - name: Build Project
        run: cargo build --release

      - name: Prepare Binary
        shell: bash
        run: |
          mkdir -p staging
          cp target/release/${{ matrix.artifact_name }} staging/${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: https://github.com/christopherHX/gitea-upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: staging/${{ matrix.asset_name }}

  publish:
    name: Publish Nightly
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: https://github.com/christopherHX/gitea-upload-artifact@v4/download-artifact
        with:
          path: artifacts

      - name: Create or Update Nightly Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure tag exists locally to push
          git tag -f nightly HEAD
          git push -f origin nightly
          
          # Check if release exists
          if gh release view nightly > /dev/null 2>&1; then
            echo "Updating existing nightly release..."
            gh release upload nightly artifacts/**/* --clobber
          else
            echo "Creating new nightly release..."
            gh release create nightly artifacts/**/* \
              --title "Nightly Build" \
              --notes "Automated nightly build. Experimental and unstable." \
              --prerelease
          fi
